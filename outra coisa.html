<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sprite Character Fix</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; }
        canvas { background: #34495e; border: 4px solid #ecf0f1; image-rendering: pixelated; margin-top: 20px; }
        .info { margin-top: 10px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Personagem 2D - Sprite Sheet</h2>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="status" class="info">Carregando imagem...</div>
    
    <div style="margin-top: 10px;">
        Controles: <b>Setas</b> (Andar) | <b>Espaço</b> (Pular) | <b>Z</b> (Atacar) | <b>X</b> (Defender)
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const spriteImg = new Image();
spriteImg.src = 'personagem sprite.png'; 

// AJUSTE DE CORTE (Baseado na sua imagem com textos)
const offsetEsquerda = 160; // Ignora a coluna com os textos "1. ANDANDO..."
const offsetTopo = 50;      // Pequeno ajuste para o topo se necessário
const colunas = 6;
const linhas = 5;

let frameLargura = 0;
let frameAltura = 0;

const player = {
    x: 100, y: 280,
    largura: 100, altura: 100,
    velX: 0, velY: 0,
    velocidade: 3,
    forcaPulo: -14,
    gravidade: 0.6,
    noChao: false,
    animacao: 0,
    frameAtual: 0,
    contadorFrames: 0,
    delayAnimacao: 12, // Aumentado para a animação ficar mais lenta e visível
    lado: 1
};

const teclas = {};
window.addEventListener('keydown', e => teclas[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => teclas[e.key.toLowerCase()] = false);

spriteImg.onload = () => {
    // Calcula o tamanho descontando o texto da esquerda
    frameLargura = (spriteImg.width - offsetEsquerda) / colunas;
    frameAltura = (spriteImg.height - offsetTopo) / linhas;
    loop();
};

function atualizar() {
    player.velX = 0;
    
    // Movimento
    if (teclas['arrowright']) { player.velX = player.velocidade; player.lado = 1; }
    else if (teclas['arrowleft']) { player.velX = -player.velocidade; player.lado = -1; }

    // Pulo
    if (teclas[' '] && player.noChao) {
        player.velY = player.forcaPulo;
        player.noChao = false;
    }

    // Seleção de Linha de Animação
    if (!player.noChao) {
        player.animacao = 2; // Linha 3 (Pulo)
    } else if (teclas['z']) {
        player.animacao = 3; // Linha 4 (Ataque)
    } else if (teclas['x']) {
        player.animacao = 4; // Linha 5 (Defesa)
    } else if (player.velX !== 0) {
        player.animacao = 1; // Linha 2 (Correndo) ou 0 para andando
    } else {
        player.animacao = 0; // Linha 1 (Parado/Andando)
        player.frameAtual = 0; 
    }

    // Gravidade
    player.velY += player.gravidade;
    player.y += player.velY;
    player.x += player.velX;

    // Chão fixo
    if (player.y > 280) {
        player.y = 280;
        player.velY = 0;
        player.noChao = true;
    }

    // Controle de Velocidade da Animação
    player.contadorFrames++;
    if (player.contadorFrames >= player.delayAnimacao) {
        player.frameAtual = (player.frameAtual + 1) % colunas;
        player.contadorFrames = 0;
    }
}

function desenhar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Chão decorativo
    ctx.fillStyle = "#3e5871";
    ctx.fillRect(0, 375, canvas.width, 25);

    ctx.save();
    
    // Posição do recorte na imagem original
    let sx = offsetEsquerda + (player.frameAtual * frameLargura);
    let sy = offsetTopo + (player.animacao * frameAltura);

    if (player.lado === -1) {
        ctx.translate(player.x + player.largura, player.y);
        ctx.scale(-1, 1);
        ctx.drawImage(spriteImg, sx, sy, frameLargura, frameAltura, 0, 0, player.largura, player.altura);
    } else {
        ctx.drawImage(spriteImg, sx, sy, frameLargura, frameAltura, player.x, player.y, player.largura, player.altura);
    }
    
    ctx.restore();
}

function loop() {
    atualizar();
    desenhar();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
